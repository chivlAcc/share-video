<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemutar Video</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        video {
            max-width: 100%;
            max-height: 100vh;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <!-- Ganti "video-saya.mp4" dengan nama file video Anda -->
    <video controls autoplay muted playsinline>
        <source src="ivaljevon.mp4" type="video/mp4">
        Browser Anda tidak mendukung pemutar video HTML5.
    </video>

</body>
</html>
